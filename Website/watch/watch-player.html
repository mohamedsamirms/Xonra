<!DOCTYPE html>
<html lang="en">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3772280062787057" crossorigin="anonymous"></script>
  <meta name="yandex-verification" content="e2a25d997c110d3f" />
  <meta name="google-site-verification" content="AdIz_bRhs8cElxQrhPT_2cGMKeZ4MuWoLpaWjWE_EwQ" />
  <meta name="description" content="Watch videos on Xonra" />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="../images/Xonra-darkmode.png" sizes="any">
  <title id="pageTitle">Xonra – Watch</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="../styles.css">
  <script src="../scripts.js" defer></script>
  <script src="../animations.js" defer></script>

  <style>
    .player-page {
      display: flex;
      gap: 24px;
      max-width: 1450px;
      margin: 30px auto;
      padding: 0 20px;
    }
    .main-content { flex: 1; min-width: 0; }

    .video-player-container {
      position: relative;
      background: #0a0a0a;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
      margin-bottom: 20px;
    }
    #videoPlayer {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
    }

    /* Custom Controls */
    .controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
      padding: 20px 20px 15px;
      opacity: 0;
      transition: opacity 0.25s ease;
      z-index: 10;
    }
    .video-player-container:hover .controls,
    .controls:hover { opacity: 1; }

    .progress-container {
      height: 6px;
      background: rgba(255,255,255,0.3);
      border-radius: 999px;
      margin-bottom: 15px;
      cursor: pointer;
      position: relative;
    }
    .progress {
      height: 100%;
      background: #00d4ff;
      border-radius: 999px;
      width: 0%;
      transition: width 0.1s linear;
    }

    .buttons {
      display: flex;
      align-items: center;
      gap: 18px;
      color: #fff;
    }
    .buttons button {
      background: none;
      border: none;
      color: #eee;
      font-size: 21px;
      cursor: pointer;
      padding: 5px;
      border-radius: 50%;
      transition: all 0.2s;
    }
    .buttons button:hover {
      color: #00d4ff;
      transform: scale(1.15);
    }
    .buttons select {
      background: rgba(0,0,0,0.7);
      color: white;
      border: 1px solid #555;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 15px;
    }

    .video-details {
      background: #1a1a1a;
      padding: 24px;
      border-radius: 12px;
    }
    .video-details h1 {
      font-size: 1.85rem;
      margin: 0 0 10px 0;
    }
    .video-meta { color: #aaa; margin-bottom: 16px; }
    .video-description { color: #ddd; line-height: 1.6; }

    /* Recommended */
    .recommended-sidebar {
      width: 380px;
      flex-shrink: 0;
    }
    .recommended-sidebar h3 { color: #fff; margin-bottom: 18px; }
    .video-item {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      padding: 4px;
      border-radius: 10px;
      transition: 0.2s;
    }
    .video-item:hover { background: #252525; }
    .thumbnail {
      width: 168px;
      height: 94px;
      object-fit: cover;
      border-radius: 8px;
    }
    .duration {
      position: absolute;
      bottom: 6px; right: 6px;
      background: rgba(0,0,0,0.8);
      color: white;
      font-size: 12px;
      padding: 1px 6px;
      border-radius: 3px;
    }
  </style>
</head>
<body>

<header>
  <a href="../" class="logo-container logo-link" aria-label="Xonra home">
    <img src="../images/Xonra-darkmode.png" alt="Xonra" onerror="this.onerror=null; this.src='../images/Xonra-logo.png';">
    <span class="Xonra_topleft">Xonra</span>
  </a>
  
  <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-menu" aria-label="Open navigation">
    <span></span><span></span><span></span>
  </button>
  
  <div class="header-actions" id="site-menu">
    <nav class="navigation">
      <a href="watch.html" class="nav-link" aria-current="page">Watch</a>
      <a href="../settings" class="nav-link settings-gear">
        <i class="fas fa-cog"></i>
        <span class="settings-label">Settings</span>
      </a>
    </nav>
  </div>
</header>

<div class="player-page">
  <div class="main-content">
    <div class="video-player-container">
      <video id="videoPlayer"></video>

      <!-- Custom Controls -->
      <div class="controls">
        <div class="progress-container" id="progressContainer">
          <div class="progress" id="progress"></div>
        </div>
        <div class="buttons">
          <button id="playPause">▶</button>
          <span id="time">0:00 / 0:00</span>

          <button id="speedBtn">1x</button>
          <select id="speedSelect">
            <option value="0.25">0.25x</option>
            <option value="0.5">0.5x</option>
            <option value="0.75">0.75x</option>
            <option value="1" selected>1x</option>
            <option value="1.25">1.25x</option>
            <option value="1.5">1.5x</option>
            <option value="2">2x</option>
            <option value="3">3x</option>
            <option value="4">4x</option>
            <option value="6">6x</option>
            <option value="8">8x</option>
            <option value="10">10x</option>
          </select>

          <button id="captionsBtn">💬</button>
          <button id="pipBtn">📺</button>
          <button id="fullscreenBtn">⛶</button>
        </div>
      </div>
    </div>

    <div class="video-details">
      <h1 id="videoTitle"></h1>
      <p id="videoMeta" class="video-meta"></p>
      <p id="videoDescription" class="video-description"></p>
    </div>
  </div>

  <div class="recommended-sidebar" id="recommendedVideos"></div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const videoId = urlParams.get('id');
  const video = document.getElementById('videoPlayer');

  async function loadVideo() {
    try {
      const response = await fetch('data/Videos.json');
      const videos = await response.json();
      const currentVideo = videos.find(v => v.id == videoId);

      if (currentVideo) {
        video.src = currentVideo.url;
        document.getElementById('videoTitle').textContent = currentVideo.title;
        document.getElementById('videoMeta').textContent = 
          `${currentVideo.publisher} • ${currentVideo.time} • ${currentVideo.views || '1K views'}`;
        document.getElementById('videoDescription').textContent = currentVideo.description || 'No description available.';
        document.getElementById('pageTitle').textContent = `${currentVideo.title} - Xonra`;
      }
    } catch (error) {
      console.error('Error loading video:', error);
    }
  }

  // ================== PLAYER CONTROLS ==================
  const playPause = document.getElementById('playPause');
  const progressContainer = document.getElementById('progressContainer');
  const progress = document.getElementById('progress');
  const timeDisplay = document.getElementById('time');
  const speedSelect = document.getElementById('speedSelect');

  playPause.addEventListener('click', () => {
    video.paused ? video.play() : video.pause();
  });

  video.addEventListener('play', () => playPause.textContent = '❚❚');
  video.addEventListener('pause', () => playPause.textContent = '▶');

  video.addEventListener('timeupdate', () => {
    const percent = video.duration ? (video.currentTime / video.duration) * 100 : 0;
    progress.style.width = percent + '%';
    timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
  });

  progressContainer.addEventListener('click', (e) => {
    const rect = progressContainer.getBoundingClientRect();
    const pos = (e.clientX - rect.left) / rect.width;
    video.currentTime = pos * video.duration;
  });

  speedSelect.addEventListener('change', () => {
    video.playbackRate = parseFloat(speedSelect.value);
    document.getElementById('speedBtn').textContent = speedSelect.value + 'x';
  });

  // Fixed Fullscreen
  document.getElementById('fullscreenBtn').addEventListener('click', () => {
    const container = document.querySelector('.video-player-container');
    if (document.fullscreenElement) {
      document.exitFullscreen();
    } else {
      container.requestFullscreen().catch(err => {
        console.error("Fullscreen failed:", err);
        alert("Fullscreen not supported on this device/browser.");
      });
    }
  });

  document.getElementById('pipBtn').addEventListener('click', async () => {
    try {
      if (document.pictureInPictureElement) await document.exitPictureInPicture();
      else await video.requestPictureInPicture();
    } catch (e) {}
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === " ") { e.preventDefault(); playPause.click(); }
    if (e.key.toLowerCase() === "f") document.getElementById('fullscreenBtn').click();
    if (e.key === "ArrowRight") video.currentTime += 10;
    if (e.key === "ArrowLeft") video.currentTime -= 10;
  });

  function formatTime(seconds) {
    if (!seconds || isNaN(seconds)) return "0:00";
    const min = Math.floor(seconds / 60);
    const sec = Math.floor(seconds % 60);
    return `${min}:${sec < 10 ? '0' : ''}${sec}`;
  }

  // Recommended Videos (same as before)
  async function loadRecommended() {
    try {
      const response = await fetch('data/Videos.json');
      const videos = await response.json();
      const container = document.getElementById('recommendedVideos');
      container.innerHTML = '<h3>Recommended</h3>';

      videos.forEach(v => {
        if (v.id != videoId) {
          container.innerHTML += `
            <div class="video-item" onclick="window.location.href='watch-player.html?id=${v.id}'">
              <div class="thumbnail-container" style="position:relative;">
                <img src="${v.thumbnail}" class="thumbnail">
                <div class="duration">${v.duration || ''}</div>
              </div>
              <div>
                <h4 style="margin:0 0 6px 0; font-size:1.05rem;">${v.title}</h4>
                <p style="margin:0; color:#888; font-size:0.9rem;">${v.publisher}</p>
              </div>
            </div>`;
        }
      });
    } catch (e) { console.error(e); }
  }

  document.addEventListener('DOMContentLoaded', () => {
    loadVideo();
    loadRecommended();
  });
</script>
</body>
</html>
