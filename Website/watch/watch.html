<header>

  <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-menu" aria-label="Open navigation">
    <span></span>

</header>
<div class="content">
  <h1 class="page-title">Watch</h1>
  
  <!-- Search Bar -->
  <div class="search-bar" style="margin: 20px 0;">
    <input type="text" id="searchInput" placeholder="Search videos..." onkeyup="searchVideos()">
  </div>

  <!-- Dynamic Video Grid -->
  <div class="video-gallery" id="videoGallery">
    <div class="loading">Loading videos...</div>
  </div>
</div>

<script>
  async function loadVideos() {
    try {
      const response = await fetch('Videos.json');
      const videos = await response.json();
      
      const gallery = document.getElementById('videoGallery');
      gallery.innerHTML = '';

      videos.forEach(video => {
        const videoHTML = `
          <div class="video-item" data-id="${video.id}">
            <a href="watch-player.html?id=${video.id}" class="thumbnail-container">
              <img src="${video.thumbnail}" alt="${video.title}" class="thumbnail">
              <div class="duration">${video.duration || ''}</div>
              <div class="play-overlay">
                <i class="fas fa-play"></i>
              </div>
            </a>
            <div class="video-info">
              <h3 class="video-title">${video.title}</h3>
              <p class="video-publisher">${video.publisher}</p>
              <p class="video-meta">${video.time} • ${video.views || '1K views'}</p>
            </div>
          </div>
        `;
        gallery.innerHTML += videoHTML;
      });
    } catch (error) {
      console.error('Error loading videos:', error);
      document.getElementById('videoGallery').innerHTML = 
        '<p style="color: red; text-align: center; grid-column: 1 / -1;">Failed to load videos. Make sure Videos.json is in the same folder.</p>';
    }
  }

  function searchVideos() {
    const query = document.getElementById('searchInput').value.toLowerCase().trim();
    const items = document.querySelectorAll('.video-item');
    
    items.forEach(item => {
      const title = item.querySelector('.video-title').textContent.toLowerCase();
      item.style.display = title.includes(query) ? '' : 'none';
    });
  }

  // Load videos when page is ready
  document.addEventListener('DOMContentLoaded', loadVideos);
</script>

</body>
</html>
