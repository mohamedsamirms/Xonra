<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Idle - Xonra</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        .idle-container {
            background: #fff;
            border-radius: 12px;
            padding: 60px 40px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.3);
            animation: pop-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes pop-in {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        h1 {
            font-size: 2.5rem;
            margin: 0 0 20px 0;
            color: #000;
            font-weight: 700;
            letter-spacing: -1px;
        }

        p {
            font-size: 1.1rem;
            color: #333;
            margin: 0 0 40px 0;
            line-height: 1.5;
        }

        button {
            background: #888;
            color: #fff;
            border: none;
            padding: 14px 36px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s ease, transform 0.2s ease;
            font-family: inherit;
        }

        button:hover {
            background: #666;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.98);
        }

        #memory-stats {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #ccc;
            font-size: 0.85rem;
            color: #666;
            font-family: 'Courier New', monospace;
        }

        #memory-stats strong {
            display: block;
            color: #000;
            margin-bottom: 8px;
        }

        .memory-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 6px;
        }

        .memory-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00aa00, #ff6600);
            width: 50%;
            transition: width 0.5s ease;
        }

        @media (max-width: 600px) {
            .idle-container {
                padding: 40px 25px;
            }

            h1 {
                font-size: 1.8rem;
            }

            p {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="idle-container">
        <h1>website idle</h1>
        <p>we turned off the website to save your ram</p>
        <button id="wake-btn">im back, turn it on</button>
        
        <div id="memory-stats">
            <strong>💾 RAM Usage</strong>
            <div id="memory-info">Detecting...</div>
            <div class="memory-bar">
                <div class="memory-bar-fill" id="memory-bar-fill"></div>
            </div>
        </div>
    </div>

    <script>
        // Get the page the user came from
        const previousPage = sessionStorage.getItem('previousPage') || '/';
        
        // Memory monitoring
        let memoryInterval = null;
        
        function updateMemoryDisplay() {
            if (performance.memory) {
                const mem = performance.memory;
                const used = Math.round(mem.usedJSHeapSize / 1048576);
                const limit = Math.round(mem.jsHeapSizeLimit / 1048576);
                const percentage = Math.round((mem.usedJSHeapSize / mem.jsHeapSizeLimit) * 100);
                
                const status = percentage > 80 ? '⚠️ HIGH' : percentage > 60 ? '⚡ MEDIUM' : '✅ OK';
                
                document.getElementById('memory-info').textContent = 
                    `${used}MB / ${limit}MB (${percentage}%) - ${status}`;
                document.getElementById('memory-bar-fill').style.width = percentage + '%';
            }
        }
        
        // Update memory display on load and every second
        updateMemoryDisplay();
        memoryInterval = setInterval(updateMemoryDisplay, 1000);
        
        // Handle wake up button
        document.getElementById('wake-btn').addEventListener('click', () => {
            clearInterval(memoryInterval);
            // Navigate back to the previous page
            window.location.href = previousPage;
        });

        // Also wake up on any activity
        const activityHandler = () => {
            clearInterval(memoryInterval);
            window.location.href = previousPage;
        };

        document.addEventListener('mousemove', activityHandler, { once: true });
        document.addEventListener('keypress', activityHandler, { once: true });
        document.addEventListener('click', activityHandler, { once: true });
        document.addEventListener('touchstart', activityHandler, { once: true });
    </script>
</body>
</html>
